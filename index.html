<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomou?</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

input, button {
  padding: 12px;
  margin: 8px;
  width: 80%;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>Tomou?</h1>
<p>Garantimos que sim.</p>

<div id="app"></div>

<script>
const API = "COLE_SUA_URL_AQUI";

// ==========================
// STATE
// ==========================
let state = {
  user: null
};

// ==========================
// INIT
// ==========================
init();

async function init() {
  const user_id = localStorage.getItem("tomoa_user_id");

  if (user_id) {
    await loadUser(user_id);
  } else {
    renderLogin();
  }
}

// ==========================
// API
// ==========================
async function api(params) {
  const url = API + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

// ==========================
// LOGIN
// ==========================
function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Login</h2>
      <input id="tel" placeholder="Telefone">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <p onclick="renderCadastro()">Criar conta</p>
      <p onclick="renderRecuperar()">Esqueci minha senha</p>
    </div>
  `;
}

async function login() {
  const telefone = document.getElementById("tel").value;
  const senha = document.getElementById("senha").value;

  const res = await api({
    action: "login",
    telefone,
    senha
  });

  if (res.status === "ok") {
    localStorage.setItem("tomoa_user_id", res.user_id);
    await loadUser(res.user_id);
  } else {
    alert("Login inválido");
  }
}

// ==========================
// CADASTRO
// ==========================
function renderCadastro() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Criar Conta</h2>
      <input id="nome" placeholder="Nome">
      <input id="tel" placeholder="Telefone">
      <input id="senha" type="password" placeholder="Senha">
      <input id="senha2" type="password" placeholder="Confirmar senha">
      <button onclick="criarConta()">Cadastrar</button>
      <p onclick="renderLogin()">Voltar</p>
    </div>
  `;
}

async function criarConta() {
  const nome = document.getElementById("nome").value;
  const telefone = document.getElementById("tel").value;
  const senha = document.getElementById("senha").value;
  const senha2 = document.getElementById("senha2").value;

  if (senha !== senha2) {
    alert("Senhas não conferem");
    return;
  }

  const check = await api({
    action: "checkUser",
    telefone
  });

  if (check.exists) {
    alert("Telefone já cadastrado");
    return;
  }

  const res = await api({
    action: "createUser",
    nome,
    telefone,
    senha
  });

  if (res.status === "ok") {
    localStorage.setItem("tomoa_user_id", res.user_id);
    await loadUser(res.user_id);
  }
}

// ==========================
// USUÁRIO
// ==========================
async function loadUser(user_id) {
  const user = await api({
    action: "getUser",
    user_id
  });

  state.user = user;

  renderHome();
}

// ==========================
// HOME
// ==========================
function renderHome() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Olá, ${state.user.nome}</h2>
      <p>Plano: ${state.user.plano}</p>

      <button onclick="renderRemedios()">Ver Remédios</button>
      <button onclick="logout()">Sair</button>
    </div>
  `;
}

// ==========================
// REMÉDIOS
// ==========================
async function renderRemedios() {
  const res = await api({
    action: "listRemedios",
    user_id: state.user.id
  });

  let html = "<div class='card'><h2>Remédios</h2>";

  res.forEach(r => {
    html += `<p>${r.nome} - ${new Date(r.horario).toLocaleTimeString()}</p>`;
  });

  html += `
    <input id="nomeRem" placeholder="Nome do remédio">
    <input id="horaRem" type="time">
    <button onclick="addRemedio()">Adicionar</button>
    <br><br>
    <button onclick="renderHome()">Voltar</button>
  </div>
  `;

  document.getElementById("app").innerHTML = html;
}

async function addRemedio() {
  const nome = document.getElementById("nomeRem").value;
  const horario = document.getElementById("horaRem").value;

  const hoje = new Date().toISOString().split("T")[0];
  const dataHora = hoje + "T" + horario;

  const res = await api({
    action: "addRemedio",
    user_id: state.user.id,
    nome,
    horario: dataHora
  });

  if (res.error === "limite_free") {
    alert("Plano free permite apenas 2 remédios");
    return;
  }

  renderRemedios();
}

// ==========================
// RECUPERAR SENHA
// ==========================
function renderRecuperar() {
  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Recuperar Senha</h2>
      <input id="tel" placeholder="Telefone">
      <input id="nova" type="password" placeholder="Nova senha">
      <button onclick="resetar()">Resetar</button>
      <p onclick="renderLogin()">Voltar</p>
    </div>
  `;
}

async function resetar() {
  const telefone = document.getElementById("tel").value;
  const nova_senha = document.getElementById("nova").value;

  const res = await api({
    action: "resetPassword",
    telefone,
    nova_senha
  });

  if (res.status === "ok") {
    alert("Senha atualizada");
    renderLogin();
  }
}

// ==========================
// LOGOUT
// ==========================
function logout() {
  localStorage.removeItem("tomoa_user_id");
  renderLogin();
}
</script>

</body>
</html>
